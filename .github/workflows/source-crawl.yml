name: Source Crawl

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * 1"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      KEEP_N: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install --no-save wrangler@^4

      - name: Crawl sources
        run: python scripts/crawl_sources.py

      - name: Build snapshot upsert SQL
        run: python scripts/snapshots_to_d1_observation_sql.py

      - name: Apply normalization schema to D1 (remote)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute energy-duty-db --remote --file=sql/import_normalization.sql

      - name: Ensure captured_at migration (remote, idempotent)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/ensure_captured_at_migration.py --db energy-duty-db --remote

      - name: Load snapshots into D1 source_observation (remote)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute energy-duty-db --remote --file=sql/snapshots_upsert.sql

      - name: Build cleanup SQL (keep latest N)
        run: python scripts/generate_cleanup_sql.py

      - name: Cleanup old source_observation rows (remote)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute energy-duty-db --remote --file=sql/cleanup_source_observation_keep_latest_n.generated.sql

      - name: Generate QA report (remote)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/generate_qa_report.py --db energy-duty-db --remote

      - name: Local E2E smoke test gate
        run: |
          npx wrangler d1 execute energy-duty-db --local --file=schema.sql
          npx wrangler d1 execute energy-duty-db --local --file=seed.sql
          npx wrangler dev --local --port 8787 >/tmp/wrangler.log 2>&1 &
          WRANGLER_PID=$!
          sleep 8
          python scripts/smoke_test.py --base-url http://127.0.0.1:8787 --api-key demo-free-key-001
          kill $WRANGLER_PID

      - name: Skip D1 load when secrets are missing
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Skipping D1 remote load. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets."

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source_snapshots.csv
          git add sql/snapshots_upsert.sql
          git add sql/cleanup_source_observation_keep_latest_n.generated.sql
          git add qa_reports/*.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update source snapshots"
          git push
